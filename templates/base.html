<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>{% block title %}SMP PC Kitchen{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar {% block nav_class %}{% endblock %}">
        <div style="display:flex;align-items:center;gap:8px;">
            <div class="nav-brand" id="navBrand">SMP PC Kitchen</div>
            {% if request.path != '/manage' %}
            <button id="adminBtn" class="btn btn-outline btn-sm" aria-label="관리자">관리</button>
            {% endif %}
        </div>
        {% block nav_links %}
        <div class="nav-links">
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">체크리스트</a>
            <a href="/inventory" class="nav-link {% if request.path == '/inventory' %}active{% endif %}">재고관리</a>
        </div>
        {% endblock %}
    </nav>

    <main class="container {% block container_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <div id="toast" class="toast hidden"></div>

    <!-- Admin password modal -->
    <div id="adminModal" class="modal-overlay" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="adminModalTitle">
            <h2 id="adminModalTitle">관리자 로그인</h2>
            <div class="form-group">
                <label for="adminPassword">비밀번호</label>
                <input id="adminPassword" type="password" placeholder="비밀번호 입력">
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" id="adminCancelBtn">취소</button>
                <button class="btn btn-primary" id="adminSubmitBtn">로그인</button>
            </div>
        </div>
    </div>

    <!-- Scroll FAB -->
    <button class="scroll-fab" id="scrollFab" onclick="toggleScroll()">&#9660;</button>

    <script>
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type;
            setTimeout(() => t.className = 'toast hidden', 2000);
        }

        function api(url, options = {}) {
            if (options.body && typeof options.body === 'object') {
                options.body = JSON.stringify(options.body);
                options.headers = { 'Content-Type': 'application/json', ...options.headers };
            }
            return fetch(url, options).then(r => r.json());
        }

        function getSelectedStaff() {
            const el = document.querySelector('.staff-btn.selected');
            return el ? el.dataset.name : '';
        }

        // Admin button + password modal (mobile-friendly)
        (function() {
            const adminBtn = document.getElementById('adminBtn');
            const modal = document.getElementById('adminModal');
            const passwdInput = document.getElementById('adminPassword');
            const cancelBtn = document.getElementById('adminCancelBtn');
            const submitBtn = document.getElementById('adminSubmitBtn');

            function showModal() {
                if (!modal) return;
                modal.classList.add('show');
                if (passwdInput) { passwdInput.value = ''; setTimeout(() => passwdInput.focus(), 50); }
            }
            function hideModal() {
                if (!modal) return;
                modal.classList.remove('show');
            }

            if (adminBtn) adminBtn.addEventListener('click', showModal);
            if (cancelBtn) cancelBtn.addEventListener('click', hideModal);
            if (modal) modal.addEventListener('click', (e) => { if (e.target === modal) hideModal(); });

            if (submitBtn) submitBtn.addEventListener('click', async () => {
                const pwd = passwdInput ? passwdInput.value : '';
                try {
                    const res = await api('/api/admin/login', { method: 'POST', body: { password: pwd } });
                    if (res && res.ok) {
                        showToast('관리자 인증 성공', 'success');
                        hideModal();
                        window.location.href = '/manage';
                    } else {
                        showToast(res && res.error ? res.error : '인증 실패', 'error');
                    }
                } catch (err) {
                    showToast('서버 오류', 'error');
                }
            });

            if (passwdInput) passwdInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitBtn && submitBtn.click(); });
        })();

        // Logo click on admin page -> go back to main
        (function() {
            const navBrand = document.getElementById('navBrand');
            if (navBrand) {
                navBrand.addEventListener('click', () => {
                    if (window.location.pathname === '/manage') {
                        window.location.href = '/';
                    }
                });
            }
        })();

        // Scroll FAB logic
        const fab = document.getElementById('scrollFab');
        let atBottom = false;

        function updateFab() {
            const scrollTop = window.scrollY;
            const scrollMax = document.documentElement.scrollHeight - window.innerHeight;
            atBottom = scrollTop > scrollMax - 50;
            fab.innerHTML = atBottom ? '&#9650;' : '&#9660;';
            fab.style.opacity = scrollMax > 100 ? '1' : '0';
            fab.style.pointerEvents = scrollMax > 100 ? 'auto' : 'none';
        }

        function toggleScroll() {
            if (atBottom) window.scrollTo({ top: 0, behavior: 'smooth' });
            else window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
        }

        window.addEventListener('scroll', updateFab, { passive: true });
        updateFab();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
