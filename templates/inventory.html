{% extends "base.html" %}
{% block title %}재고관리 - SMP PC Kitchen{% endblock %}

{% block content %}
<div class="page-header">
    <h1>재고 관리</h1>
</div>

<div class="staff-bar">
    <label>담당자</label>
    <div class="staff-buttons" id="staffButtons"></div>
</div>

<div id="lowStockAlert"></div>

<!-- Combobox search: type or pick from dropdown -->
<div class="search-bar">
    <input type="text" id="searchInput" list="itemList" placeholder="품목 검색 (입력 또는 선택)..." oninput="onSearch()">
    <datalist id="itemList"></datalist>
</div>

<!-- Category quick-nav pills (wrap) -->
<div class="cat-pills" id="catPills"></div>

<div id="inventoryContainer"></div>

<!-- History Modal -->
<div class="modal-overlay" id="historyModal">
    <div class="modal">
        <h2 id="historyTitle">입출고 이력</h2>
        <ul class="history-list" id="historyList"></ul>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal('historyModal')">닫기</button>
        </div>
    </div>
</div>

<!-- Transaction Modal -->
<div class="modal-overlay" id="txModal">
    <div class="modal">
        <h2>입출고 등록</h2>
        <div class="form-group">
            <label>품목</label>
            <input type="text" id="txItemName" readonly>
            <input type="hidden" id="txItemId">
        </div>
        <div class="form-group">
            <label>유형</label>
            <select id="txType">
                <option value="in">입고 (+)</option>
                <option value="out">출고 (-)</option>
            </select>
        </div>
        <div class="form-group">
            <label>수량</label>
            <input type="number" id="txQty" min="1" value="1" inputmode="numeric">
        </div>
        <div class="form-group">
            <label>메모</label>
            <input type="text" id="txNote" placeholder="선택사항">
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal('txModal')">취소</button>
            <button class="btn btn-primary" onclick="submitTransaction()">등록</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let inventoryData = [];
let activeCat = null;
let collapsedCats = {}; // track collapsed state per category

async function loadStaff() {
    const staff = await api('/api/staff');
    const container = document.getElementById('staffButtons');
    const saved = localStorage.getItem('smp_staff');
    container.innerHTML = staff.map(s =>
        `<button class="staff-btn ${s.name === saved ? 'selected' : ''}" data-name="${s.name}" onclick="selectStaff(this)">${s.name}</button>`
    ).join('');
}

function selectStaff(btn) {
    document.querySelectorAll('.staff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    localStorage.setItem('smp_staff', btn.dataset.name);
}

async function loadSearchDropdown() {
    const items = await api('/api/inventory/all-items');
    document.getElementById('itemList').innerHTML = items.map(i =>
        `<option value="${i.name}">`
    ).join('');
}

async function loadInventory() {
    inventoryData = await api('/api/inventory');
    // Default all categories to collapsed on first load
    inventoryData.forEach(cat => {
        if (!(cat.id in collapsedCats)) collapsedCats[cat.id] = true;
    });
    renderCatPills();
    renderInventory();
    loadLowStock();
}

async function loadLowStock() {
    const items = await api('/api/inventory/low-stock');
    const el = document.getElementById('lowStockAlert');
    if (items.length === 0) { el.innerHTML = ''; return; }
    el.innerHTML = `
        <div class="alert-card">
            <h3>재고 부족 항목 (${items.length}개)</h3>
            <table class="low-stock-table">
                <thead><tr><th>카테고리</th><th>품목</th><th>현재</th><th>최소</th></tr></thead>
                <tbody>${items.map(i => `
                    <tr>
                        <td>${i.category}</td>
                        <td style="font-weight:600">${i.name}</td>
                        <td class="qty-danger">${i.quantity}</td>
                        <td>${i.min_threshold}</td>
                    </tr>
                `).join('')}</tbody>
            </table>
        </div>`;
}

function renderCatPills() {
    const container = document.getElementById('catPills');
    container.innerHTML =
        `<button class="cat-pill ${activeCat === null ? 'active' : ''}" onclick="selectCat(null)">전체</button>` +
        inventoryData.map(cat =>
            `<button class="cat-pill ${activeCat === cat.id ? 'active' : ''}" onclick="selectCat(${cat.id})">${cat.name}</button>`
        ).join('');
}

function selectCat(catId) {
    activeCat = catId;
    document.getElementById('searchInput').value = '';
    // Expand the selected category, collapse others
    if (catId !== null) {
        inventoryData.forEach(cat => { collapsedCats[cat.id] = cat.id !== catId; });
    }
    renderCatPills();
    renderInventory();
}

function onSearch() {
    activeCat = null;
    // Expand all when searching
    const search = document.getElementById('searchInput').value.toLowerCase();
    if (search) {
        inventoryData.forEach(cat => { collapsedCats[cat.id] = false; });
    }
    renderCatPills();
    renderInventory();
}

function toggleCat(catId) {
    collapsedCats[catId] = !collapsedCats[catId];
    renderInventory();
}

function renderInventory() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const container = document.getElementById('inventoryContainer');

    container.innerHTML = inventoryData.map(cat => {
        if (activeCat !== null && cat.id !== activeCat) return '';

        const filteredItems = cat.items.filter(i => !search || i.name.toLowerCase().includes(search));
        if (search && filteredItems.length === 0) return '';

        const lowCount = filteredItems.filter(i => i.low_stock).length;
        const isCollapsed = collapsedCats[cat.id] && !search;

        return `
            <div class="card" id="cat-${cat.id}">
                <div class="inv-card-header ${isCollapsed ? 'collapsed' : ''}" onclick="toggleCat(${cat.id})">
                    <span>${cat.name}
                        <span class="badge badge-count">${filteredItems.length}</span>
                        ${lowCount ? `<span class="badge badge-danger">${lowCount} 부족</span>` : ''}
                    </span>
                    <span class="toggle-arrow">&#9660;</span>
                </div>
                <div class="card-body" ${isCollapsed ? 'style="display:none"' : ''}>
                    <ul class="inv-list">
                        ${filteredItems.map(item => `
                            <li class="inv-item ${item.low_stock ? 'low-stock' : ''}">
                                <div class="inv-name">
                                    ${item.name}
                                    ${item.location ? `<div class="inv-location">${item.location}</div>` : ''}
                                </div>
                                <div class="inv-qty">
                                    <button class="qty-btn minus" onclick="quickAdjust(${item.id}, -1, event)">-</button>
                                    <span class="qty-value ${item.low_stock ? 'low' : ''}">${item.quantity}</span>
                                    <button class="qty-btn plus" onclick="quickAdjust(${item.id}, 1, event)">+</button>
                                </div>
                                <button class="btn btn-outline btn-sm" onclick="openTxModal(${item.id}, '${item.name.replace(/'/g, "\\'")}')">입출고</button>
                                <button class="btn btn-outline btn-sm" onclick="showHistory(${item.id}, '${item.name.replace(/'/g, "\\'")}')">이력</button>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            </div>`;
    }).join('');
}

async function quickAdjust(itemId, delta, event) {
    event.stopPropagation();
    const staff = getSelectedStaff();
    await api(`/api/inventory/${itemId}/transaction`, {
        method: 'POST',
        body: { type: delta > 0 ? 'in' : 'out', quantity: Math.abs(delta), staff_name: staff, note: '빠른 조정' }
    });
    for (const cat of inventoryData) {
        const item = cat.items.find(i => i.id === itemId);
        if (item) { item.quantity = Math.max(0, item.quantity + delta); item.low_stock = item.quantity <= item.min_threshold; break; }
    }
    renderInventory();
}

function openTxModal(itemId, itemName) {
    document.getElementById('txItemId').value = itemId;
    document.getElementById('txItemName').value = itemName;
    document.getElementById('txQty').value = 1;
    document.getElementById('txNote').value = '';
    document.getElementById('txModal').classList.add('show');
}

async function submitTransaction() {
    const itemId = document.getElementById('txItemId').value;
    const type = document.getElementById('txType').value;
    const qty = parseInt(document.getElementById('txQty').value);
    const note = document.getElementById('txNote').value;
    if (!qty || qty < 1) { showToast('수량을 입력하세요', 'error'); return; }
    await api(`/api/inventory/${itemId}/transaction`, {
        method: 'POST', body: { type, quantity: qty, note, staff_name: getSelectedStaff() }
    });
    closeModal('txModal');
    showToast(`${type === 'in' ? '입고' : '출고'} 완료`);
    loadInventory();
}

async function showHistory(itemId, itemName) {
    document.getElementById('historyTitle').textContent = `${itemName} 이력`;
    const txs = await api(`/api/inventory/${itemId}/history`);
    document.getElementById('historyList').innerHTML = txs.length === 0
        ? '<li style="padding:16px;color:var(--text-secondary)">이력이 없습니다</li>'
        : txs.map(tx => `
            <li class="history-item">
                <span class="${tx.type === 'in' ? 'tx-in' : 'tx-out'}">${tx.type === 'in' ? '+' : '-'}${tx.quantity}</span>
                <span>${tx.note || ''}</span>
                <span style="color:var(--text-secondary)">${tx.created_by || ''} ${tx.created_at || ''}</span>
            </li>`).join('');
    document.getElementById('historyModal').classList.add('show');
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('show'); });
});

loadStaff();
loadInventory();
loadSearchDropdown();
</script>
{% endblock %}
